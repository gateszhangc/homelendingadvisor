apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: homelendingadvisor
  namespace: argocd
spec:
  description: Home Lending Advisor application managed from the application repository
  sourceRepos:
    - https://github.com/gateszhangc/homelendingadvisor.git
  destinations:
    - namespace: homelendingadvisor
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
