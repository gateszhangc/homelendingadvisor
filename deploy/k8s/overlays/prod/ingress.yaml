apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homelendingadvisor
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - secretName: homelendingadvisor-live-tls
      hosts:
        - homelendingadvisor.lol
  rules:
    - host: homelendingadvisor.lol
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: homelendingadvisor
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homelendingadvisor-www
  annotations:
    nginx.ingress.kubernetes.io/permanent-redirect: https://homelendingadvisor.lol/
    nginx.ingress.kubernetes.io/permanent-redirect-code: "308"
spec:
  ingressClassName: nginx
  tls:
    - secretName: homelendingadvisor-live-tls
      hosts:
        - www.homelendingadvisor.lol
  rules:
    - host: www.homelendingadvisor.lol
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: homelendingadvisor
                port:
                  number: 80
