apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelendingadvisor
  labels:
    app.kubernetes.io/name: homelendingadvisor
    app.kubernetes.io/part-of: homelendingadvisor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: homelendingadvisor
      app.kubernetes.io/part-of: homelendingadvisor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homelendingadvisor
        app.kubernetes.io/part-of: homelendingadvisor
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      containers:
        - name: web
          image: registry.144.91.77.245.sslip.io/homelendingadvisor:bootstrap
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: 0.0.0.0
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /
              port: 3000
            failureThreshold: 30
            periodSeconds: 5
