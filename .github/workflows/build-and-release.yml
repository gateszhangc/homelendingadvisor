name: Build And Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: homelendingadvisor-release
  cancel-in-progress: true

env:
  IMAGE_NAME: registry.144.91.77.245.sslip.io/homelendingadvisor
  KUSTOMIZATION_FILE: deploy/k8s/overlays/prod/kustomization.yaml

jobs:
  build-and-push:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Derive image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: registry.144.91.77.245.sslip.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}

  update-gitops-tag:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update image tag
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os

          path = Path(os.environ["KUSTOMIZATION_FILE"])
          image_name = os.environ["IMAGE_NAME"]
          image_tag = os.environ["IMAGE_TAG"]

          lines = path.read_text().splitlines()
          inside_images = False
          current_image = None
          updated = False

          for index, line in enumerate(lines):
            stripped = line.strip()
            if stripped == "images:":
              inside_images = True
              current_image = None
              continue

            if inside_images and stripped and not line.startswith((" ", "\t", "-")):
              inside_images = False
              current_image = None

            if not inside_images:
              continue

            if stripped.startswith("- name:"):
              current_image = stripped.split(":", 1)[1].strip()
              continue

            if stripped.startswith("name:"):
              current_image = stripped.split(":", 1)[1].strip()
              continue

            if current_image == image_name and stripped.startswith("newTag:"):
              prefix = line[: line.index("n")]
              lines[index] = f"{prefix}newTag: {image_tag}"
              updated = True
              break

          if not updated:
            raise SystemExit(f"Unable to update newTag for {image_name} in {path}")

          path.write_text("\n".join(lines) + "\n")
          PY

      - name: Commit manifest update
        run: |
          if git diff --quiet -- "$KUSTOMIZATION_FILE"; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$KUSTOMIZATION_FILE"
          git commit -m "chore: release ${{ needs.build-and-push.outputs.image_tag }} [skip ci]"
          git push origin HEAD:main
